<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!--CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-dark-3">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
          <span class="navbar-icon">💰</span>
          <span class="navbar-title">ExpenseTracker</span>
        </a>
        <span class="navbar-text"> Track. Save. Grow. </span>
      </div>
    </nav>

    <!-- SUMMARY CARDS -->
    <div class="container mt-4">
      <div class="row g-3">
        <!-- Income Card -->
        <div class="col-md-4">
          <div class="card income-card">
            <div class="card-body">
              <p class="card-lable">Total Income</p>
              <h3 class="card-amount" id="totalIncome">&#8377;0.00</h3>
            </div>
          </div>
        </div>

        <!-- Expense Card -->
        <div class="col-md-4">
          <div class="card expense-card">
            <div class="card-body">
              <p class="card-lable">Total Expense</p>
              <h3 class="card-amount" id="totalExpense">&#8377;0.00</h3>
            </div>
          </div>
        </div>

        <!-- Balance Card -->
        <div class="col-md-4">
          <div class="card balance-card">
            <div class="card-body">
              <p class="card-lable">Total Balance</p>
              <h3 class="card-amount" id="totalBalance">&#8377;0.00</h3>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- FORM -->
    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card p-3">
            <h5 class="text-white mb-3">Add Transaction</h5>

            <!-- Description -->
            <div class="mb-3">
              <label class="form-label text-secondary">Description</label>
              <input
                type="text"
                id="description"
                class="form-control bg-dark text-white border-secondary"
                placeholder="e.g. Salary, Rent, Food"
              />
            </div>

            <!-- Amount -->
            <div class="mb-3">
              <label class="form-label text-secondary">Amount</label>
              <input
                type="number"
                id="amount"
                class="form-control bg-dark text-white border-secondary"
                placeholder="e.g. 500"
              />
            </div>

            <!-- Type -->
            <div class="mb-3">
              <label class="form-label text-secondary">Type</label>
              <select
                id="type"
                class="form-select bg-dark text-white border-secondary"
              >
                <option value="income">💰 Income</option>
                <option value="expense">💸 Expense</option>
              </select>
            </div>

            <!-- Button -->
            <button id="addBtn" class="btn w-100 fw-bold">
              + Add Transaction
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!--JS -->
    <script src="main.js"></script>
  </body>
</html>
